name: nitro_webgpu
description: >-
  WebGPU for Flutter built on Nitro: GPU compute and rendering from Dart
  with one API on every platform. Dual wgpu-native/Dawn backends, WGSL and
  GLSL shaders at runtime, zero-copy presentation widgets with controllers,
  and typed GPU errors — all with zero method-channel overhead.
version: 0.0.1
homepage: https://github.com/Shreemanarjun/nitro_webgpu
repository: https://github.com/Shreemanarjun/nitro_webgpu
issue_tracker: https://github.com/Shreemanarjun/nitro_webgpu/issues
documentation: https://nitro.shreeman.dev
funding:
  - https://buymeacoffee.com/shreemanarjun

topics:
  - webgpu
  - gpu
  - shaders
  - graphics
  - nitro

environment:
  sdk: ^3.12.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  nitro: ^0.5.15
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  nitro_generator: ^0.5.15

flutter:
  plugin:
    platforms:
      android:
        pluginClass: NitroWebgpuPlugin
        package: dev.shreeman.nitro_webgpu
        ffiPlugin: true
      ios:
        pluginClass: SwiftNitroWebgpuPlugin
        ffiPlugin: true
      macos:
        pluginClass: SwiftNitroWebgpuPlugin
        ffiPlugin: true
      # Desktop declares real plugin classes (unlike a pure-FFI plugin):
      # they own the Flutter texture registrar for the presenters — DXGI
      # shared-texture composition on Windows, pixel-buffer on Linux.
      windows:
        pluginClass: NitroWebgpuPluginCApi
        ffiPlugin: true
      linux:
        pluginClass: NitroWebgpuPlugin
        ffiPlugin: true
