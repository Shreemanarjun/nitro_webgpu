name: integration tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS (Metal)
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Cache wgpu-native
        uses: actions/cache@v4
        with:
          path: |
            src/third_party/wgpu_native
            macos/nitro_webgpu/Frameworks
            ios/nitro_webgpu/Frameworks
          key: wgpu-native-${{ runner.os }}-${{ hashFiles('scripts/wgpu_native.sha256') }}
      - name: Fetch wgpu-native
        run: ./scripts/fetch_wgpu_native.sh --targets macos-aarch64,macos-x86_64,ios-aarch64,ios-aarch64-simulator,ios-x86_64-simulator
      - name: Release build (symbol survival gate)
        working-directory: example
        run: |
          flutter pub get
          flutter build macos --release
      - name: Integration tests
        working-directory: example
        run: flutter test integration_test/wgpu_instance_test.dart -d macos
      - name: Complex parity tests
        working-directory: example
        run: flutter test integration_test/wgpu_parity_complex_test.dart -d macos

  linux:
    name: Linux (lavapipe software Vulkan)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev mesa-vulkan-drivers vulkan-tools xvfb
      - name: Cache wgpu-native
        uses: actions/cache@v4
        with:
          path: src/third_party/wgpu_native
          key: wgpu-native-${{ runner.os }}-${{ hashFiles('scripts/wgpu_native.sha256') }}
      - name: Fetch wgpu-native
        run: ./scripts/fetch_wgpu_native.sh --targets linux-x86_64
      - name: Release build (symbol survival gate)
        working-directory: example
        run: |
          flutter pub get
          flutter build linux --release
      - name: Integration tests (fallback adapter)
        working-directory: example
        run: xvfb-run -a flutter test integration_test/wgpu_instance_test.dart -d linux --dart-define=WGPU_FORCE_FALLBACK=true
      - name: Complex parity tests (fallback adapter)
        working-directory: example
        run: xvfb-run -a flutter test integration_test/wgpu_parity_complex_test.dart -d linux --dart-define=WGPU_FORCE_FALLBACK=true

  windows:
    name: Windows (D3D12 WARP)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Cache wgpu-native
        uses: actions/cache@v4
        with:
          path: src/third_party/wgpu_native
          key: wgpu-native-${{ runner.os }}-${{ hashFiles('scripts/wgpu_native.sha256') }}
      - name: Fetch wgpu-native
        shell: bash
        run: ./scripts/fetch_wgpu_native.sh --targets windows-x86_64-msvc
      - name: Release build (symbol survival gate)
        working-directory: example
        run: |
          flutter pub get
          flutter build windows --release
      - name: Integration tests (fallback adapter)
        working-directory: example
        run: flutter test integration_test/wgpu_instance_test.dart -d windows --dart-define=WGPU_FORCE_FALLBACK=true
      - name: Complex parity tests (fallback adapter)
        working-directory: example
        run: flutter test integration_test/wgpu_parity_complex_test.dart -d windows --dart-define=WGPU_FORCE_FALLBACK=true
